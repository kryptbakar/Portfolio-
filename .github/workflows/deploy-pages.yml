name: Deploy portfolio to GitHub Pages

# Publishes the static portfolio (index.html + assets/) to GitHub Pages.
# In repo Settings → Pages, set "Source" to "GitHub Actions" once.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "assets/**"
      - "robots.txt"
      - "sitemap.xml"
      - ".nojekyll"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage static site
        run: |
          mkdir -p _site
          cp -r index.html assets _site/
          cp robots.txt sitemap.xml _site/ 2>/dev/null || true
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
